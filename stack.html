<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Share+Tech+Mono&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {

  /* Side panel decorative strips */

  #cabinet::before { left: 6px; }

  /* Screen bezel */
  #screen-bezel {

    box-shadow:
      0 0 0 2px #1a1208,

  /* Screen glow halo */

  #game-container {

  /* Bottom controls panel */
  #controls-panel {

  .ctrl-dot {

  }
  .ctrl-dot.red   { background: radial-gradient(circle at 40% 35%, #ff6655, #cc1100); color: #ff3311; }
  .ctrl-dot.blue  { background: radial-gradient(circle at 40% 35%, #44aaff, #0044cc); color: #2288ff; }

  .ctrl-stick {

  }
  .ctrl-stick::before {

  #hud {

  #score-display {

  .overlay.hidden { opacity: 0; pointer-events: none; }

  .ov-title {

  }

  .ov-score {

  }

  .btn-row {
    display: flex;
    gap: 10px;
  }

  .arcade-btn {
    background: none;
    border: 1px solid rgba(0,220,255,0.35);
    color: rgba(0,220,255,0.85);
    font-family: 'Orbitron', monospace;

  .arcade-btn:hover, .arcade-btn:active {

<body>
<div id="cabinet">
  <div id="marquee">✦ STACK ✦</div>
  <div id="screen-bezel">
<div id="game-container">
  <div id="hud">
    <div>
      <div id="score-display">0</div>
      <div id="combo-text"></div>
    </div>
    <button id="pause-btn" title="Pause">⏸</button>
  </div>

  <div class="canvas-wrap">
    <canvas id="canvas" width="320" height="480"></canvas>

    <!-- Start / Lobby overlay -->
    <div class="overlay" id="start-overlay">
      <div class="ov-title">STACK</div>
      <div class="ov-sub">TAP ANYWHERE TO DROP</div>
      <div class="btn-row">
        <button class="arcade-btn green" id="start-btn">▶ START</button>
      </div>
      <div class="ov-best">BEST <span id="best-score-start">0</span></div>
    </div>

    <!-- Game Over overlay -->
    <div class="overlay hidden" id="over-overlay">
      <div class="ov-title">GAME OVER</div>
      <div class="ov-score-label">SCORE</div>
      <div class="ov-score" id="final-score">0</div>
      <div class="btn-row">
        <button class="arcade-btn green" id="again-btn">↺ PLAY AGAIN</button>
        <button class="arcade-btn" id="lobby-btn">⌂ LOBBY</button>
      </div>
      <div class="ov-best">BEST <span id="best-score-over">0</span></div>
    </div>

    <!-- Pause overlay -->
    <div class="overlay hidden" id="pause-overlay">
      <div class="ov-title">PAUSED</div>
      <div class="ov-sub">GAME SUSPENDED</div>
      <div class="btn-row">
        <button class="arcade-btn green" id="resume-btn">▶ RESUME</button>
        <button class="arcade-btn" id="pause-lobby-btn">⌂ LOBBY</button>
      </div>
    </div>
  </div>
</div><!-- /game-container -->
  </div><!-- /screen-bezel -->
  <div id="controls-panel">
    <div class="ctrl-dot red"></div>
    <div class="ctrl-stick"></div>
    <div class="ctrl-dot blue"></div>
    <div class="ctrl-dot yellow"></div>
  </div>
</div><!-- /cabinet -->

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;

const BLOCK_H = 28;
const VISIBLE = 12;
const BASE_SPD = 2.4;
const SPD_INC = 0.13;

// Arcade color palettes: [fill, glow/outline]
const PALETTES = [
  ['#0d1f3c', '#00dcff'],
  ['#1a0d3c', '#b44aff'],
  ['#0d3c1a', '#00ff88'],
  ['#3c0d1a', '#ff4466'],
  ['#3c2a0d', '#ffaa00'],
  ['#0d2e3c', '#00ccff'],
  ['#1f3c0d', '#aaff00'],
  ['#3c0d30', '#ff44cc'],
];

function getPalette(i) { return PALETTES[i % PALETTES.length]; }

// State
let state = 'idle'; // idle | playing | paused | over
let score = 0;
let bestScore = parseInt(localStorage.getItem('stackBest') || '0');
let blocks = [], moving = null;
let stackOffset = 0, targetOffset = 0;
let fallingPieces = [];
let perfectStreak = 0;
let comboTimer = null;
let animId = null;

// Update best score displays
function updateBestDisplays() {
  document.getElementById('best-score-start').textContent = bestScore;
  document.getElementById('best-score-over').textContent = bestScore;
}
updateBestDisplays();

// ── Overlays ──────────────────────────────────────────────
function showOverlay(id) {
  ['start-overlay','over-overlay','pause-overlay'].forEach(n => {
    document.getElementById(n).classList.toggle('hidden', n !== id);
  });
}
function hideAllOverlays() {
  ['start-overlay','over-overlay','pause-overlay'].forEach(n =>
    document.getElementById(n).classList.add('hidden'));
}

// ── Game init ─────────────────────────────────────────────
function initGame() {
  score = 0; perfectStreak = 0;
  blocks = []; fallingPieces = [];
  stackOffset = 0; targetOffset = 0;
  setScore(0);
  setCombo('');

  const baseW = 200, baseX = (W - baseW) / 2;
  for (let i = 0; i < 3; i++) {
    const [fill, glow] = getPalette(i);
    blocks.push({ x: baseX, w: baseW, y: H - BLOCK_H * (i + 1), fill, glow });
  }
  spawnMoving();
}

function spawnMoving() {
  const last = blocks[blocks.length - 1];
  const [fill, glow] = getPalette(blocks.length);
  const spd = (BASE_SPD + SPD_INC * Math.min(score, 35)) * (Math.random() < 0.5 ? 1 : -1);
  moving = { x: spd > 0 ? -last.w : W, w: last.w, y: last.y - BLOCK_H, speed: spd, fill, glow };
}

// ── Drop logic ────────────────────────────────────────────
function drop() {
  if (state !== 'playing') return;
  const last = blocks[blocks.length - 1];
  const cur = moving;

  const oStart = Math.max(cur.x, last.x);
  const oEnd   = Math.min(cur.x + cur.w, last.x + last.w);
  const oW     = oEnd - oStart;

  if (oW <= 0) {
    // Completely missed — drop entire block
    spawnFalling(cur.x, cur.y, cur.w, cur.fill, cur.glow);
    triggerGameOver();
    return;
  }

  const PERF = 7;
  let fx = oStart, fw = oW;
  if (Math.abs(oW - last.w) <= PERF) {
    fx = last.x; fw = last.w;
    perfectStreak++;
    setCombo(perfectStreak >= 3 ? `${perfectStreak}✕ PERFECT` : 'PERFECT');
  } else {
    perfectStreak = 0;
    setCombo('');
    // Spawn the cut-off piece falling
    if (cur.x < last.x) {
      // overhang on the left
      spawnFalling(cur.x, cur.y, last.x - cur.x, cur.fill, cur.glow);
    } else {
      // overhang on the right
      spawnFalling(last.x + last.w, cur.y, (cur.x + cur.w) - (last.x + last.w), cur.fill, cur.glow);
    }
  }

  blocks.push({ x: fx, w: fw, y: cur.y, fill: cur.fill, glow: cur.glow });
  score++;
  setScore(score);
  if (blocks.length > VISIBLE) targetOffset = (blocks.length - VISIBLE) * BLOCK_H;
  spawnMoving();
}

// ── Falling pieces ────────────────────────────────────────
function spawnFalling(x, y, w, fill, glow) {
  fallingPieces.push({
    x, y, w, fill, glow,
    vy: 2,
    vx: (Math.random() - 0.5) * 3,
    rot: 0,
    vrot: (Math.random() - 0.5) * 0.15,
    alpha: 1
  });
}

function updateFalling() {
  fallingPieces = fallingPieces.filter(p => p.alpha > 0.02);
  fallingPieces.forEach(p => {
    p.vy += 0.4;
    p.x  += p.vx;
    p.y  += p.vy;
    p.rot += p.vrot;
    p.alpha *= 0.94;
  });
}

// ── Score / combo UI ──────────────────────────────────────
function setScore(n) {
  const el = document.getElementById('score-display');
  el.textContent = n;
  el.classList.remove('pop');
  void el.offsetWidth;
  el.classList.add('pop');
  setTimeout(() => el.classList.remove('pop'), 80);
}

function setCombo(text) {
  clearTimeout(comboTimer);
  const el = document.getElementById('combo-text');
  el.textContent = text;
  if (text) comboTimer = setTimeout(() => { el.textContent = ''; }, 700);
}

// ── Game over ─────────────────────────────────────────────
function triggerGameOver() {
  state = 'over';
  if (score > bestScore) {
    bestScore = score;
    localStorage.setItem('stackBest', bestScore);
    updateBestDisplays();
  }
  document.getElementById('final-score').textContent = score;
  setTimeout(() => showOverlay('over-overlay'), 400);
}

// ── Game start / lobby ────────────────────────────────────
function startGame() {
  state = 'playing';
  hideAllOverlays();
  initGame();
}

function goLobby() {
  state = 'idle';
  showOverlay('start-overlay');
}

function pauseGame() {
  if (state !== 'playing') return;
  state = 'paused';
  showOverlay('pause-overlay');
  document.getElementById('pause-btn').textContent = '▶';
}

function resumeGame() {
  if (state !== 'paused') return;
  state = 'playing';
  hideAllOverlays();
  document.getElementById('pause-btn').textContent = '⏸';
}

// ── Draw ──────────────────────────────────────────────────
function drawBlock(b, offsetY, alpha) {
  const y = b.y + offsetY;
  if (y > H + BLOCK_H || y + BLOCK_H < -BLOCK_H) return;

  ctx.save();
  ctx.globalAlpha = alpha;

  // Fill with slight gradient
  const grad = ctx.createLinearGradient(b.x, y, b.x, y + BLOCK_H);
  grad.addColorStop(0, lighten(b.fill, 0.18));
  grad.addColorStop(1, b.fill);
  ctx.fillStyle = grad;
  ctx.shadowColor = b.glow;
  ctx.shadowBlur = 14;
  ctx.fillRect(b.x + 1, y + 1, b.w - 2, BLOCK_H - 2);

  // Glowing outline
  ctx.strokeStyle = b.glow;
  ctx.lineWidth = 1.5;
  ctx.shadowColor = b.glow;
  ctx.shadowBlur = 18;
  ctx.strokeRect(b.x + 1, y + 1, b.w - 2, BLOCK_H - 2);

  // Inner shine
  ctx.shadowBlur = 0;
  ctx.fillStyle = 'rgba(255,255,255,0.07)';
  ctx.fillRect(b.x + 2, y + 2, b.w - 4, 5);

  ctx.restore();
}

function drawFalling(p) {
  ctx.save();
  ctx.globalAlpha = p.alpha;
  const cx = p.x + p.w / 2, cy = p.y + BLOCK_H / 2;
  ctx.translate(cx, cy);
  ctx.rotate(p.rot);

  ctx.shadowColor = p.glow;
  ctx.shadowBlur = 12;
  ctx.fillStyle = p.fill;
  ctx.fillRect(-p.w/2, -BLOCK_H/2, p.w, BLOCK_H);

  ctx.strokeStyle = p.glow;
  ctx.lineWidth = 1.5;
  ctx.strokeRect(-p.w/2, -BLOCK_H/2, p.w, BLOCK_H);
  ctx.restore();
}

function lighten(hex, amt) {
  const n = parseInt(hex.slice(1), 16);
  let r = Math.min(255, ((n >> 16) & 0xff) + Math.round(255 * amt));
  let g = Math.min(255, ((n >> 8)  & 0xff) + Math.round(255 * amt));
  let b = Math.min(255, ( n        & 0xff) + Math.round(255 * amt));
  return `rgb(${r},${g},${b})`;
}

let bgTime = 0;

function drawArcadeBG() {
  bgTime += 0.012;
  // Simple dark background
  ctx.fillStyle = '#04020f';
  ctx.fillRect(0, 0, W, H);
  // Simple scanlines
  ctx.fillStyle = 'rgba(0,0,0,0.08)';
  for (let y = 0; y < H; y += 3) ctx.fillRect(0, y, W, 1);
}

function draw() {
  ctx.clearRect(0, 0, W, H);
  drawArcadeBG();

  // Smooth scroll
  stackOffset += (targetOffset - stackOffset) * 0.11;

  // Stacked blocks
  blocks.forEach((b, i) => {
    const alpha = Math.min(1, 0.35 + (i / blocks.length) * 0.65);
    drawBlock(b, stackOffset, alpha);
  });

  // Moving block
  if (moving && state === 'playing') {
    moving.x += moving.speed;
    if (moving.x + moving.w > W + 30) moving.speed = -Math.abs(moving.speed);
    if (moving.x < -30) moving.speed =  Math.abs(moving.speed);

    // Guide lines
    const last = blocks[blocks.length - 1];
    ctx.save();
    ctx.setLineDash([3, 7]);
    ctx.strokeStyle = `${last.glow}22`;
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(last.x, 0); ctx.lineTo(last.x, H); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(last.x + last.w, 0); ctx.lineTo(last.x + last.w, H); ctx.stroke();
    ctx.restore();

    drawBlock(moving, stackOffset, 0.95);
  }

  // Falling pieces
  updateFalling();
  fallingPieces.forEach(drawFalling);
}

function loop() {
  draw();
  animId = requestAnimationFrame(loop);
}

// ── Input ─────────────────────────────────────────────────
document.getElementById('start-btn').addEventListener('click', e => {
  e.stopPropagation(); startGame();
});
document.getElementById('again-btn').addEventListener('click', e => {
  e.stopPropagation(); startGame();
});
document.getElementById('lobby-btn').addEventListener('click', e => {
  e.stopPropagation(); goLobby();
});
document.getElementById('resume-btn').addEventListener('click', e => {
  e.stopPropagation(); resumeGame();
});
document.getElementById('pause-lobby-btn').addEventListener('click', e => {
  e.stopPropagation(); goLobby();
});
document.getElementById('pause-btn').addEventListener('click', e => {
  e.stopPropagation();
  if (state === 'playing') pauseGame();
  else if (state === 'paused') resumeGame();
});

// Keyboard
document.addEventListener('keydown', e => {
  if (e.code === 'Space') {
    e.preventDefault();
    if (state === 'playing') drop();
    else if (state === 'idle') startGame();
    else if (state === 'paused') resumeGame();
  }
  if (e.code === 'Escape' || e.code === 'KeyP') {
    if (state === 'playing') pauseGame();
    else if (state === 'paused') resumeGame();
  }
});

// Touch / click on canvas
function handleAction(e) {
  // Don't fire if tapping a button
  if (e.target !== canvas) return;
  e.preventDefault();
  if (state === 'playing') drop();
}

canvas.addEventListener('pointerdown', handleAction);

loop();
</script>
</body>
</html>
